name: Apply assignment autograd fix

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/detach-pytorch-assignment-costs-20260722'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply focused source and regression changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("src/pyrecest/utils/assignment.py")
          source = source_path.read_text(encoding="utf-8")

          import_anchor = "from pyrecest.backend import sum as _sum\nfrom pyrecest.backend import where as _where\n"
          import_replacement = "from pyrecest.backend import sum as _sum\nfrom pyrecest.backend import to_numpy as _to_numpy\nfrom pyrecest.backend import where as _where\n"
          if source.count(import_anchor) != 1:
              raise RuntimeError("unexpected assignment import layout")
          source = source.replace(import_anchor, import_replacement)

          object_conversion = "values = _np.asarray(value, dtype=object).reshape(-1)"
          detached_object_conversion = (
              "values = _np.asarray(_to_numpy(value), dtype=object).reshape(-1)"
          )
          if source.count(object_conversion) != 4:
              raise RuntimeError("unexpected assignment validation layout")
          source = source.replace(object_conversion, detached_object_conversion)

          solver_call = "row_ind, col_ind = linear_sum_assignment(modified_cost_matrix)"
          detached_solver_call = (
              "row_ind, col_ind = linear_sum_assignment(_to_numpy(modified_cost_matrix))"
          )
          if source.count(solver_call) != 1:
              raise RuntimeError("unexpected assignment solver layout")
          source = source.replace(solver_call, detached_solver_call)
          source_path.write_text(source, encoding="utf-8")

          test_path = Path("tests/utils/test_assignment_pytorch_requires_grad.py")
          test_path.write_text(
              '''"""Regression for PyTorch assignment costs that track gradients."""

import importlib.util

import pytest
from tests.support.backend_runner import run_backend_code


@pytest.mark.backend_portable
def test_pytorch_assignment_accepts_requires_grad_cost_matrix():
    if importlib.util.find_spec("torch") is None:
        pytest.skip("PyTorch is not installed")

    result = run_backend_code(
        "pytorch",
        """
import torch

from pyrecest.utils import (
    min_cost_max_cardinality_assignment,
    murty_k_best_assignments,
)

costs = torch.tensor(
    [[1.0, 3.0], [4.0, 2.0]],
    dtype=torch.float64,
    requires_grad=True,
)

ranked = murty_k_best_assignments(
    costs,
    k=2,
    row_non_assignment_costs=100.0,
    col_non_assignment_costs=100.0,
)
assert ranked[0]["assignment"].detach().cpu().tolist() == [0, 1]
assert ranked[0]["cost"] == 3.0

best = min_cost_max_cardinality_assignment(costs)
assert best["assignment"].detach().cpu().tolist() == [0, 1]
assert best["cost"] == 3.0
""",
    )

    assert result.returncode == 0, result.stderr
''',
              encoding="utf-8",
          )

          Path(".github/workflows/apply-assignment-autograd-fix.yml").unlink()
          PY
      - name: Validate generated changes
        shell: bash
        run: |
          python -m py_compile \
            src/pyrecest/utils/assignment.py \
            tests/utils/test_assignment_pytorch_requires_grad.py
          git diff --check
      - name: Commit focused fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Detach PyTorch assignment costs for SciPy"
          git push
