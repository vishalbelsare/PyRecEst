name: Run tracklet Viterbi state fix on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  run-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      GITHUB_REF_NAME: ${{ github.head_ref }}
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build verified fix commit
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import subprocess
          from pathlib import Path

          workflow = Path(
              ".github/workflows/apply-tracklet-viterbi-state-fix.yml"
          ).read_text()

          def extract_step(name: str) -> str:
              marker = f"      - name: {name}\n"
              step_start = workflow.index(marker)
              run_marker = "        run: |\n"
              script_start = workflow.index(run_marker, step_start) + len(run_marker)
              script_lines = []
              for line in workflow[script_start:].splitlines(keepends=True):
                  if line.startswith("          "):
                      script_lines.append(line[10:])
                  elif not line.strip():
                      script_lines.append(line)
                  else:
                      break
              return "".join(script_lines)

          environment = os.environ.copy()
          for step_name in (
              "Apply source and regression patches",
              "Run focused regression",
          ):
              script = extract_step(step_name).replace(
                  "sed -i 's/^          //' /tmp/tracklet.patch\n",
                  "",
              )
              subprocess.run(
                  ["bash", "-lc", script],
                  check=True,
                  env=environment,
              )

          repository = environment["GITHUB_REPOSITORY"]

          def gh_json(method: str, endpoint: str, payload=None):
              command = ["gh", "api", "--method", method, endpoint]
              kwargs = {
                  "text": True,
                  "check": True,
                  "capture_output": True,
                  "env": environment,
              }
              if payload is not None:
                  command += ["--input", "-"]
                  kwargs["input"] = json.dumps(payload)
              return json.loads(subprocess.run(command, **kwargs).stdout)

          base_commit_sha = subprocess.check_output(
              ["git", "rev-parse", "HEAD"], text=True
          ).strip()
          base_commit = gh_json(
              "GET", f"repos/{repository}/git/commits/{base_commit_sha}"
          )

          tree_entries = []
          for path in (
              "src/pyrecest/filters/tracklet_viterbi.py",
              "tests/filters/test_tracklet_viterbi.py",
          ):
              blob = gh_json(
                  "POST",
                  f"repos/{repository}/git/blobs",
                  {
                      "content": base64.b64encode(Path(path).read_bytes()).decode(),
                      "encoding": "base64",
                  },
              )
              tree_entries.append(
                  {
                      "path": path,
                      "mode": "100644",
                      "type": "blob",
                      "sha": blob["sha"],
                  }
              )

          tree = gh_json(
              "POST",
              f"repos/{repository}/git/trees",
              {
                  "base_tree": base_commit["tree"]["sha"],
                  "tree": tree_entries,
              },
          )
          commit = gh_json(
              "POST",
              f"repos/{repository}/git/commits",
              {
                  "message": "Fix tracklet Viterbi miss-streak state",
                  "tree": tree["sha"],
                  "parents": [base_commit_sha],
              },
          )
          commit_sha = commit["sha"]
          subprocess.run(
              [
                  "gh",
                  "pr",
                  "comment",
                  environment["PR_NUMBER"],
                  "--body",
                  f"Verified one-shot fix commit: `{commit_sha}`",
              ],
              check=True,
              env=environment,
          )
          PY
