name: Apply GM-PHD likelihood fix

on:
  push:
    branches:
      - agent/fix-gm-phd-likelihood-scale

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-gm-phd-likelihood-scale

      - name: Apply source and regression changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("src/pyrecest/filters/gaussian_mixture_phd_filter.py")
          source = source_path.read_text()
          source = source.replace(
              "    column_stack,\n    dot,\n    exp,\n",
              "    column_stack,\n    diag,\n    dot,\n    exp,\n",
          )
          source = source.replace(
              "    linalg,\n    ones,\n",
              "    linalg,\n    log,\n    ones,\n",
          )
          old_likelihood = '''    @staticmethod
              def _gaussian_likelihood(innovation, covariance):
                  covariance = GaussianMixturePHDFilter._symmetrize(covariance)
                  determinant = max(float(linalg.det(covariance)), 1e-12)
                  mahalanobis_distance = float(
                      dot(innovation, linalg.solve(covariance, innovation))
                  )
                  normalization = (2.0 * pi) ** (innovation.shape[0] / 2.0) * determinant**0.5
                  return float(exp(-0.5 * mahalanobis_distance) / normalization)
          '''
          new_likelihood = '''    @staticmethod
              def _gaussian_likelihood(innovation, covariance):
                  covariance = GaussianMixturePHDFilter._symmetrize(covariance)
                  cholesky_factor = linalg.cholesky(covariance)
                  whitened_innovation = linalg.solve(cholesky_factor, innovation)
                  mahalanobis_distance = float(dot(whitened_innovation, whitened_innovation))
                  log_determinant = 2.0 * sum(log(diag(cholesky_factor)))
                  log_likelihood = -0.5 * (
                      innovation.shape[0] * log(2.0 * pi)
                      + log_determinant
                      + mahalanobis_distance
                  )
                  return float(exp(log_likelihood))
          '''
          if old_likelihood not in source:
              raise SystemExit("Expected GM-PHD likelihood implementation not found")
          source_path.write_text(source.replace(old_likelihood, new_likelihood))

          test_path = Path("tests/filters/test_gaussian_mixture_phd_filter.py")
          tests = test_path.read_text()
          tests = tests.replace(
              "import numpy.testing as npt\n",
              "import numpy as np\nimport numpy.testing as npt\n",
          )
          insertion_point = "    def test_filter_state_roundtrip(self):\n"
          regression = '''    def test_gaussian_likelihood_preserves_small_covariance_scale(self):
                  covariance = 1e-10 * array([[2.0, 0.3], [0.3, 1.0]])
                  innovation = array([0.0, 0.0])

                  likelihood = GaussianMixturePHDFilter._gaussian_likelihood(
                      innovation, covariance
                  )
                  expected = 1.0 / np.sqrt(
                      (2.0 * np.pi) ** innovation.shape[0] * np.linalg.det(covariance)
                  )

                  npt.assert_allclose(likelihood, expected, rtol=1e-12)

          '''
          if insertion_point not in tests:
              raise SystemExit("Expected GM-PHD test insertion point not found")
          test_path.write_text(tests.replace(insertion_point, regression + insertion_point))
          PY

      - name: Verify syntax
        run: python -m compileall -q src/pyrecest/filters/gaussian_mixture_phd_filter.py tests/filters/test_gaussian_mixture_phd_filter.py

      - name: Commit clean patch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/pyrecest/filters/gaussian_mixture_phd_filter.py tests/filters/test_gaussian_mixture_phd_filter.py
          git rm .github/workflows/agent-fix-gm-phd-likelihood.yml
          git commit -m "fix: stabilize GM-PHD Gaussian likelihood"
          git push origin HEAD:agent/fix-gm-phd-likelihood-scale
