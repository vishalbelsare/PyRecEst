name: Backend first-failure diagnosis

on:
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  first-failure:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [pytorch, jax]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install system build dependencies
        run: |
          sudo rm -f \
            /etc/apt/sources.list.d/azure-cli.list \
            /etc/apt/sources.list.d/azure-cli.sources \
            /etc/apt/sources.list.d/microsoft-prod.list \
            /etc/apt/sources.list.d/microsoft-prod.sources
          sudo apt-get update
          sudo apt-get install -y \
            gfortran pkg-config ninja-build \
            libopenblas-dev liblapack-dev \
            libfftw3-dev libhealpix-cxx-dev

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry env use python
          if [ "${{ matrix.backend }}" = "jax" ]; then
            poetry install --with dev --extras "healpy_support jax_support"
          else
            poetry install --with dev --extras "healpy_support"
            poetry run python -m pip install \
              --index-url https://download.pytorch.org/whl/cpu \
              --extra-index-url https://pypi.org/simple \
              "torch>=2.4,<3.0"
          fi

      - name: Capture first test failure
        run: |
          if [ "${{ matrix.backend }}" = "jax" ]; then
            export JAX_ENABLE_X64=True
          fi
          export PYRECEST_BACKEND=${{ matrix.backend }}
          set +e
          poetry run python -m pytest \
            --rootdir . \
            -q \
            --maxfail=1 \
            ./tests 2>&1 | tee first-failure-${{ matrix.backend }}.log
          printf '%s\n' "${PIPESTATUS[0]}" > exit-code-${{ matrix.backend }}.txt
          exit 0

      - name: Upload diagnosis
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: first-failure-${{ matrix.backend }}
          path: |
            first-failure-${{ matrix.backend }}.log
            exit-code-${{ matrix.backend }}.txt
