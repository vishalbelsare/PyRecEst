name: Apply tracker cap validation fix

on:
  push:
    branches:
      - agent/reject-invalid-tracker-cap-limits

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/reject-invalid-tracker-cap-limits
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply source and regression patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              path = Path(path)
              text = path.read_text(encoding="utf-8")
              if old not in text:
                  raise RuntimeError(f"Expected patch context not found in {path}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "src/pyrecest/filters/multi_bernoulli_tracker.py",
              '''    def cap(self, maximum_number_of_components=None):
                  """Keep only the Bernoulli components with the highest existence probability."""
                  if maximum_number_of_components is None:
                      maximum_number_of_components = self.tracker_param[
                          "maximum_number_of_components"
                      ]

                  if maximum_number_of_components is None:
                      return

                  if len(self.bernoulli_components) <= maximum_number_of_components:
                      return

                  self.bernoulli_components = sorted(
                      self.bernoulli_components,
                      key=lambda component: component.existence_probability,
                      reverse=True,
                  )[:maximum_number_of_components]
''',
              '''    @staticmethod
              def _validate_optional_nonnegative_integer(value, name):
                  if value is None:
                      return None
                  message = f"{name} must be a non-negative integer or None"
                  if isinstance(value, bool) or not isinstance(value, Real):
                      raise ValueError(message)
                  value_float = float(value)
                  if value_float < 0.0 or not value_float.is_integer():
                      raise ValueError(message)
                  return int(value_float)

              def cap(self, maximum_number_of_components=None):
                  """Keep only the Bernoulli components with the highest existence probability."""
                  if maximum_number_of_components is None:
                      maximum_number_of_components = self.tracker_param[
                          "maximum_number_of_components"
                      ]
                  maximum_number_of_components = self._validate_optional_nonnegative_integer(
                      maximum_number_of_components,
                      "maximum_number_of_components",
                  )

                  if maximum_number_of_components is None:
                      return

                  if len(self.bernoulli_components) <= maximum_number_of_components:
                      return

                  self.bernoulli_components = sorted(
                      self.bernoulli_components,
                      key=lambda component: component.existence_probability,
                      reverse=True,
                  )[:maximum_number_of_components]
''',
          )

          replace_once(
              "src/pyrecest/filters/multi_bernoulli_mixture_tracker.py",
              '''    def cap(self, maximum_number_of_components=None):
                  if maximum_number_of_components is None:
                      maximum_number_of_components = self.tracker_param[
                          "maximum_number_of_components"
                      ]
                  if maximum_number_of_components is not None:
                      for hypothesis in self.hypotheses:
                          hypothesis.bernoulli_components = sorted(
                              hypothesis.bernoulli_components,
                              key=lambda component: component.existence_probability,
                              reverse=True,
                          )[:maximum_number_of_components]
                  maximum_number_of_hypotheses = self.tracker_param.get(
                      "maximum_number_of_hypotheses",
                      None,
                  )
                  if maximum_number_of_hypotheses is not None:
                      self.hypotheses = sorted(
                          self.hypotheses,
                          key=lambda hypothesis: hypothesis.weight,
                          reverse=True,
                      )[:maximum_number_of_hypotheses]
                      self._normalize_hypothesis_weights()
                  self._sync_map_components()
''',
              '''    def cap(self, maximum_number_of_components=None):
                  if maximum_number_of_components is None:
                      maximum_number_of_components = self.tracker_param[
                          "maximum_number_of_components"
                      ]
                  maximum_number_of_components = self._validate_optional_nonnegative_integer(
                      maximum_number_of_components,
                      "maximum_number_of_components",
                  )
                  if maximum_number_of_components is not None:
                      for hypothesis in self.hypotheses:
                          hypothesis.bernoulli_components = sorted(
                              hypothesis.bernoulli_components,
                              key=lambda component: component.existence_probability,
                              reverse=True,
                          )[:maximum_number_of_components]
                  maximum_number_of_hypotheses = self._validate_optional_nonnegative_integer(
                      self.tracker_param.get("maximum_number_of_hypotheses", None),
                      "maximum_number_of_hypotheses",
                  )
                  if maximum_number_of_hypotheses is not None:
                      self.hypotheses = sorted(
                          self.hypotheses,
                          key=lambda hypothesis: hypothesis.weight,
                          reverse=True,
                      )[:maximum_number_of_hypotheses]
                      self._normalize_hypothesis_weights()
                  self._sync_map_components()
''',
          )

          replace_once(
              "src/pyrecest/filters/dirichlet_process_birth_tracker.py",
              '''        maximum_number_of_birth_atoms = self.tracker_param[
                      "maximum_number_of_birth_atoms"
                  ]
                  if maximum_number_of_birth_atoms is None:
                      return
                  maximum_number_of_birth_atoms = int(maximum_number_of_birth_atoms)
                  if maximum_number_of_birth_atoms < 0:
                      raise ValueError("maximum_number_of_birth_atoms must be non-negative or None")
                  self.birth_atoms = sorted(
''',
              '''        maximum_number_of_birth_atoms = self._validate_optional_nonnegative_integer(
                      self.tracker_param["maximum_number_of_birth_atoms"],
                      "maximum_number_of_birth_atoms",
                  )
                  if maximum_number_of_birth_atoms is None:
                      return
                  self.birth_atoms = sorted(
''',
          )

          replace_once(
              "tests/filters/test_multi_bernoulli_tracker.py",
              '''

          if __name__ == "__main__":
              unittest.main()
''',
              '''

              def test_cap_rejects_invalid_component_limits(self):
                  tracker = MultiBernoulliTracker(initial_prior=self.initial_components)

                  for invalid_limit in (-1, 1.5, True):
                      with self.subTest(invalid_limit=invalid_limit):
                          with self.assertRaisesRegex(
                              ValueError,
                              "maximum_number_of_components",
                          ):
                              tracker.cap(invalid_limit)


          if __name__ == "__main__":
              unittest.main()
''',
          )

          replace_once(
              "tests/filters/test_multi_bernoulli_mixture_tracker.py",
              '''

          if __name__ == "__main__":
              unittest.main()
''',
              '''

              def test_cap_rejects_invalid_component_and_hypothesis_limits(self):
                  tracker = MultiBernoulliMixtureTracker(
                      initial_prior=[self.initial_component],
                      tracker_param=self.tracker_param,
                  )

                  for invalid_limit in (-1, 1.5, True):
                      with self.subTest(component_limit=invalid_limit):
                          with self.assertRaisesRegex(
                              ValueError,
                              "maximum_number_of_components",
                          ):
                              tracker.cap(invalid_limit)

                      tracker.tracker_param["maximum_number_of_hypotheses"] = invalid_limit
                      with self.subTest(hypothesis_limit=invalid_limit):
                          with self.assertRaisesRegex(
                              ValueError,
                              "maximum_number_of_hypotheses",
                          ):
                              tracker.cap()
                      tracker.tracker_param["maximum_number_of_hypotheses"] = None


          if __name__ == "__main__":
              unittest.main()
''',
          )

          dp_test = Path("tests/filters/test_dirichlet_process_birth_tracker.py")
          dp_text = dp_test.read_text(encoding="utf-8")
          addition = '''

          @pytest.mark.parametrize("invalid_limit", [-1, 1.5, True])
          def test_birth_atom_cap_rejects_invalid_limits(invalid_limit):
              tracker, _, _ = _tracker(maximum_number_of_birth_atoms=invalid_limit)

              with pytest.raises(ValueError, match="maximum_number_of_birth_atoms"):
                  tracker._prune_and_cap_birth_atoms()
          '''
          if "test_birth_atom_cap_rejects_invalid_limits" in dp_text:
              raise RuntimeError("DP birth cap regression already exists")
          dp_test.write_text(dp_text.rstrip() + addition + "\n", encoding="utf-8")
          PY

      - name: Install package
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run focused regression tests
        shell: bash
        run: |
          python -m compileall -q src tests
          python -m pytest -q \
            tests/filters/test_multi_bernoulli_tracker.py \
            tests/filters/test_multi_bernoulli_mixture_tracker.py \
            tests/filters/test_dirichlet_process_birth_tracker.py

      - name: Commit validated fix
        shell: bash
        run: |
          rm .github/workflows/apply-tracker-cap-validation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pyrecest/filters/multi_bernoulli_tracker.py \
                  src/pyrecest/filters/multi_bernoulli_mixture_tracker.py \
                  src/pyrecest/filters/dirichlet_process_birth_tracker.py \
                  tests/filters/test_multi_bernoulli_tracker.py \
                  tests/filters/test_multi_bernoulli_mixture_tracker.py \
                  tests/filters/test_dirichlet_process_birth_tracker.py \
                  .github/workflows/apply-tracker-cap-validation.yml
          git commit -m "Reject invalid tracker cap limits"
          git push origin HEAD:agent/reject-invalid-tracker-cap-limits
