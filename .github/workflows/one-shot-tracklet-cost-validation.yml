name: One-shot tracklet cost validation patch

on:
  push:
    branches:
      - agent/reject-nonfinite-tracklet-costs
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out patch branch
        uses: actions/checkout@v4
        with:
          ref: agent/reject-nonfinite-tracklet-costs
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Apply validation fix and regression tests
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"expected exactly one {label} anchor, found {count}")
              return text.replace(old, new, 1)

          source_path = Path("src/pyrecest/filters/tracklet_viterbi.py")
          source = source_path.read_text(encoding="utf-8")

          source = replace_once(
              source,
              '''    metadata: Mapping[str, Any] = field(default_factory=dict)


          @dataclass(frozen=True)
          class TrackletViterbiConfig:
          ''',
              '''    metadata: Mapping[str, Any] = field(default_factory=dict)

              def __post_init__(self) -> None:
                  object.__setattr__(
                      self,
                      "unary_cost",
                      _as_scalar_float(self.unary_cost, "unary_cost"),
                  )


          @dataclass(frozen=True)
          class TrackletViterbiConfig:
          ''',
              "candidate validation",
          )

          source = replace_once(
              source,
              '''                    transition_value = float(
                                      transition(
                                          previous_node.candidate,
                                          current_node.candidate,
                                          previous_miss_streak,
                                      )
                                  )
          ''',
              '''                    transition_value = _as_scalar_float(
                                      transition(
                                          previous_node.candidate,
                                          current_node.candidate,
                                          previous_miss_streak,
                                      ),
                                      "transition_cost",
                                  )
          ''',
              "dynamic-program transition validation",
          )

          source = replace_once(
              source,
              '''    unary_cost = 0.0 if selected is None else float(selected.unary_cost)
              transition = transition_cost or (
                  lambda previous, current, miss_streak: default_tracklet_transition_cost(
                      previous,
                      current,
                      miss_streak,
                      config,
                  )
              )
              if previous_committed is None:
          ''',
              '''    unary_cost = 0.0 if selected is None else float(selected.unary_cost)
              transition = transition_cost or (
                  lambda previous, current, miss_streak: default_tracklet_transition_cost(
                      previous,
                      current,
                      miss_streak,
                      config,
                  )
              )

              def evaluated_transition(previous, current, miss_streak):
                  return _as_scalar_float(
                      transition(previous, current, miss_streak),
                      "transition_cost",
                  )

              if previous_committed is None:
          ''',
              "fixed-lag transition helper",
          )

          source = replace_once(
              source,
              '''            return float(unary_cost + transition(None, selected, committed_miss_streak))
          ''',
              '''            return float(
                              unary_cost
                              + evaluated_transition(None, selected, committed_miss_streak)
                          )
          ''',
              "leading-gap transition call",
          )

          source = replace_once(
              source,
              '''        unary_cost + transition(previous_committed, selected, committed_miss_streak)
          ''',
              '''        unary_cost
                      + evaluated_transition(
                          previous_committed,
                          selected,
                          committed_miss_streak,
                      )
          ''',
              "committed transition call",
          )

          source_path.write_text(source, encoding="utf-8")

          tests_path = Path("tests/filters/test_tracklet_viterbi.py")
          tests = tests_path.read_text(encoding="utf-8")
          marker = "def test_tracklet_candidate_rejects_nonfinite_unary_costs"
          if marker in tests:
              raise RuntimeError("regression tests already present")
          tests += '''


          @pytest.mark.parametrize("invalid_cost", [np.nan, np.inf, -np.inf])
          def test_tracklet_candidate_rejects_nonfinite_unary_costs(invalid_cost):
              with pytest.raises(ValueError, match="unary_cost must be finite"):
                  TrackletAssociationCandidate("invalid", unary_cost=invalid_cost)


          @pytest.mark.parametrize("invalid_cost", [np.nan, np.inf, -np.inf])
          def test_tracklet_viterbi_solvers_reject_nonfinite_transition_costs(invalid_cost):
              frames = [
                  [TrackletAssociationCandidate("a", unary_cost=0.0)],
                  [TrackletAssociationCandidate("b", unary_cost=0.0)],
              ]

              def transition(_previous, _current, _miss_streak):
                  return invalid_cost

              with pytest.raises(ValueError, match="transition_cost must be finite"):
                  solve_tracklet_viterbi(frames, transition_cost=transition)

              with pytest.raises(ValueError, match="transition_cost must be finite"):
                  solve_fixed_lag_tracklet_viterbi(
                      frames,
                      lag_s=0.1,
                      transition_cost=transition,
                  )
          '''
          tests_path.write_text(tests, encoding="utf-8")
          PY

      - name: Run focused standalone validation
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy>=2.0,<2.5"
          python -m compileall -q \
            src/pyrecest/filters/tracklet_viterbi.py \
            tests/filters/test_tracklet_viterbi.py
          python - <<'PY'
          import importlib.util
          import math
          import sys
          from pathlib import Path

          module_path = Path("src/pyrecest/filters/tracklet_viterbi.py")
          spec = importlib.util.spec_from_file_location("tracklet_viterbi_validation", module_path)
          module = importlib.util.module_from_spec(spec)
          sys.modules[spec.name] = module
          spec.loader.exec_module(module)

          for invalid in (math.nan, math.inf, -math.inf):
              try:
                  module.TrackletAssociationCandidate("invalid", unary_cost=invalid)
              except ValueError as exc:
                  assert "unary_cost must be finite" in str(exc)
              else:
                  raise AssertionError("non-finite unary cost was accepted")

              frames = [
                  [module.TrackletAssociationCandidate("a")],
                  [module.TrackletAssociationCandidate("b")],
              ]

              def transition(_previous, _current, _miss_streak, value=invalid):
                  return value

              for solve in (
                  lambda: module.solve_tracklet_viterbi(
                      frames,
                      transition_cost=transition,
                  ),
                  lambda: module.solve_fixed_lag_tracklet_viterbi(
                      frames,
                      lag_s=0.1,
                      transition_cost=transition,
                  ),
              ):
                  try:
                      solve()
                  except ValueError as exc:
                      assert "transition_cost must be finite" in str(exc)
                  else:
                      raise AssertionError("non-finite transition cost was accepted")
          PY

      - name: Commit the fix and remove this workflow
        run: |
          rm .github/workflows/one-shot-tracklet-cost-validation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Reject non-finite tracklet Viterbi costs"
          git push origin HEAD:agent/reject-nonfinite-tracklet-costs
