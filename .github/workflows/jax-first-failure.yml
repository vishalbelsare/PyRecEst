name: Temporary focused JAX diagnosis

on:
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install system build dependencies
        run: |
          sudo rm -f \
            /etc/apt/sources.list.d/azure-cli.list \
            /etc/apt/sources.list.d/azure-cli.sources \
            /etc/apt/sources.list.d/microsoft-prod.list \
            /etc/apt/sources.list.d/microsoft-prod.sources
          sudo apt-get update
          sudo apt-get install -y \
            gfortran pkg-config ninja-build \
            libopenblas-dev liblapack-dev \
            libfftw3-dev libhealpix-cxx-dev

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry env use python
          poetry install --with dev --extras "healpy_support jax_support"

      - name: Run focused JAX tests
        run: |
          export JAX_ENABLE_X64=True
          export PYRECEST_BACKEND=jax
          set +e
          poetry run python -m pytest \
            --rootdir . \
            -q \
            --maxfail=1 \
            --tb=long \
            tests/distributions/test_abstract_dirac_extreme_weights.py \
            tests/distributions/test_hypertoroidal_dirac_grid_conversion.py \
            tests/distributions/test_hypercylindrical_dirac_distribution.py \
            tests/distributions/test_linear_dirac_distribution.py \
            > full-jax-failure.log 2>&1
          status=$?
          tail -n 320 full-jax-failure.log > jax-first-failure.log
          printf '%s\n' "$status" > jax-exit-code.txt
          exit 0

      - name: Upload diagnosis
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jax-focused-diagnosis
          path: |
            jax-first-failure.log
            jax-exit-code.txt
