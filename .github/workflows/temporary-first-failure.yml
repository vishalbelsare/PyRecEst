name: Temporary first-failure diagnosis

on:
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/temporary-first-failure.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run first failing NumPy test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYRECEST_BACKEND: numpy
        run: |
          set -o pipefail
          git init -q
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "${GITHUB_SHA}"
          git checkout -q FETCH_HEAD
          python -m pip install -q poetry >/dev/null
          poetry env use python >/dev/null
          poetry install --with dev --extras "healpy_support" --quiet >/dev/null
          poetry run python -m pytest -x -q --disable-warnings ./tests
