name: Apply affine transform finite validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/reject-nonfinite-affine-transform

      - name: Patch source and regression tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("src/pyrecest/utils/point_set_registration.py")
          source = source_path.read_text(encoding="utf-8")
          source_marker = 'raise ValueError("matrix must contain only finite values.")'
          source_anchor = '        object.__setattr__(self, "matrix", matrix)\n'
          validation = (
              '        if any(~isfinite(matrix)):\n'
              '            raise ValueError("matrix must contain only finite values.")\n'
              '        if any(~isfinite(offset)):\n'
              '            raise ValueError("offset must contain only finite values.")\n'
          )
          if source_marker not in source:
              if source.count(source_anchor) != 1:
                  raise SystemExit("AffineTransform constructor anchor changed unexpectedly")
              source = source.replace(source_anchor, validation + source_anchor, 1)
              source_path.write_text(source, encoding="utf-8")

          test_path = Path("tests/test_affine_transform_algebra.py")
          tests = test_path.read_text(encoding="utf-8")
          test_marker = "def test_constructor_rejects_nonfinite_parameters"
          test_anchor = "    def test_compose_matches_sequential_application(self):\n"
          test = (
              "    def test_constructor_rejects_nonfinite_parameters(self):\n"
              "        for invalid_value in (float(\"nan\"), float(\"inf\"), -float(\"inf\")):\n"
              "            with self.subTest(component=\"matrix\", invalid_value=invalid_value):\n"
              "                with self.assertRaisesRegex(ValueError, \"matrix.*finite\"):\n"
              "                    AffineTransform(\n"
              "                        array([[1.0, invalid_value], [0.0, 1.0]]),\n"
              "                        array([0.0, 0.0]),\n"
              "                    )\n"
              "            with self.subTest(component=\"offset\", invalid_value=invalid_value):\n"
              "                with self.assertRaisesRegex(ValueError, \"offset.*finite\"):\n"
              "                    AffineTransform(\n"
              "                        array([[1.0, 0.0], [0.0, 1.0]]),\n"
              "                        array([0.0, invalid_value]),\n"
              "                    )\n"
              "\n"
          )
          if test_marker not in tests:
              if tests.count(test_anchor) != 1:
                  raise SystemExit("AffineTransform test anchor changed unexpectedly")
              tests = tests.replace(test_anchor, test + test_anchor, 1)
              test_path.write_text(tests, encoding="utf-8")
          PY

      - name: Check syntax
        run: python -m compileall -q src/pyrecest/utils/point_set_registration.py tests/test_affine_transform_algebra.py

      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Patch already applied"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pyrecest/utils/point_set_registration.py tests/test_affine_transform_algebra.py
          git commit -m "Reject nonfinite affine transforms"
          git push origin HEAD:agent/reject-nonfinite-affine-transform
