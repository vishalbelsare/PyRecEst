name: Apply PyTorch linspace device fix

on:
  push:
    branches:
      - agent/fix-pytorch-linspace-device-selection

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-pytorch-linspace-device-selection
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Apply source and regression-test patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("src/pyrecest/_backend/pytorch/__init__.py")
          source = source_path.read_text(encoding="utf-8")
          old = '''    device = next(
              (value.device for value in (start, stop) if _torch.is_tensor(value)),
              None,
          )
          '''
          new = '''    device = next(
              (
                  value.device
                  for value in (start, stop)
                  if _torch.is_tensor(value) and value.device.type != "cpu"
              ),
              None,
          )
          if device is None:
              device = next(
                  (value.device for value in (start, stop) if _torch.is_tensor(value)),
                  None,
              )
          '''
          if source.count(old) != 1:
              raise RuntimeError("Expected exactly one PyTorch linspace device-selection block")
          source_path.write_text(source.replace(old, new, 1), encoding="utf-8")

          test_path = Path(
              "tests/backend_support/test_pytorch_linspace_device_contract.py"
          )
          test_path.write_text(
              '''import importlib.util

          import pytest

          from tests.support.backend_runner import run_backend_code

          pytestmark = pytest.mark.backend_portable


          def _linspace_device_contract_code(target_module):
              return f"""
          import torch
          import pyrecest  # noqa: F401  # triggers backend-support compatibility patches
          import pyrecest.backend as backend
          import pyrecest._backend.pytorch as raw_pytorch


          def _non_cpu_device():
              if torch.cuda.is_available():
                  return torch.device("cuda")
              return torch.device("meta")


          target = {target_module}
          device = _non_cpu_device()
          start = torch.tensor(0.0)
          stop = torch.tensor(1.0, device=device)

          result = target.linspace(start, stop, num=3)

          assert result.device.type == device.type
          assert result.shape == (3,)
          if device.type != "meta":
              expected = torch.tensor([0.0, 0.5, 1.0], device=device)
              assert torch.allclose(result, expected)

          print("ok")
          """


          def test_raw_pytorch_linspace_prefers_existing_non_cpu_endpoint_device():
              if importlib.util.find_spec("torch") is None:
                  pytest.skip("PyTorch is not installed")

              result = run_backend_code("numpy", _linspace_device_contract_code("raw_pytorch"))

              assert result.returncode == 0, result.stderr
              assert "ok" in result.stdout


          def test_public_pytorch_linspace_prefers_existing_non_cpu_endpoint_device():
              if importlib.util.find_spec("torch") is None:
                  pytest.skip("PyTorch is not installed")

              result = run_backend_code("pytorch", _linspace_device_contract_code("backend"))

              assert result.returncode == 0, result.stderr
              assert "ok" in result.stdout
          ''',
              encoding="utf-8",
          )
          PY

      - name: Install focused test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[pytorch_support]" pytest

      - name: Run focused regression tests
        run: |
          python -m pytest -q \
            tests/backend_support/test_pytorch_linspace_device_contract.py \
            tests/backend_support/test_pytorch_linspace_contract.py \
            tests/backend_support/test_pytorch_linspace_integer_dtype_contract.py

      - name: Commit validated fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/agent-fix-pytorch-linspace-device.yml
          git add src/pyrecest/_backend/pytorch/__init__.py \
            tests/backend_support/test_pytorch_linspace_device_contract.py
          git commit -m "Prefer non-CPU devices for PyTorch linspace"
          git push origin HEAD:agent/fix-pytorch-linspace-device-selection
