name: Diagnose Merwe NumPy

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install matching NumPy test environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry env use python
          poetry install --with dev --extras "healpy_support"

      - name: Run NumPy suite to first failure
        continue-on-error: true
        env:
          PYRECEST_BACKEND: numpy
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          poetry run python -m pytest \
            --rootdir . \
            -q \
            --maxfail=1 \
            --junitxml=merwe-numpy-results.xml \
            ./tests

      - name: Upload diagnostic test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: merwe-numpy-results
          path: merwe-numpy-results.xml
